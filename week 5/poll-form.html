<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 Poll Form- User Poll</title>
    <link rel="stylesheet" href="styles/poll-form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=Inria+Sans:ital@0;1&display=swap"
        rel="stylesheet">
</head>
<body>
    <header>
        <h1>Poll Form</h1>
        <p>We would love to hear from you! Please fill out the form below and we will get back to you as soon as possible.</p>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <label for="fullname">Full Name: </label>
                <input type="text" id="fullname" name="fullname">
                <label for="email">Email: </label>
                <input type="email" id="useremail" name="useremail">
            </fieldset>
            <fieldset>
                <legend>Questions</legend>
                <label for="question"> What is your favorite browser?</label>
                <select id="browser" name="browser">
                    <option value="chrome">Chrome</option>
                    <option value="firefox">Firefox</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="other">Other</option>
                </select>
                <label for="pet"> Do you have a favorite pet?</label>
                <input type =checkbox id="pet" name="pet">
                <label for="feedback"> List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="5" placeholder="Enter your feedback here..."></textarea>
            </fieldset>
            <button type="submit">Submit</button>
        </form>
          
        

    </main>
</body>
<footer>
<p>©️ 2025 | WDD 130 | Poll Form | Kimberly Hendricks</p>
</footer>
</html>
